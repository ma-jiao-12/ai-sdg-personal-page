<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>午后茶会贪吃蛇</title>
  <style>
    :root {
      --bg-1: #FFF8F0;
      --bg-2: #FFE4C4;
      --bg-3: #FFD1DC;
      --paper: rgba(255, 252, 247, 0.9);
      --card: rgba(255, 250, 244, 0.86);
      --card-strong: rgba(255, 247, 237, 0.94);
      --border: rgba(214, 174, 140, 0.38);
      --text: #6D4C41;
      --muted: #9D7B68;
      --shadow: 0 12px 26px rgba(176, 144, 116, 0.12);
      --shadow-soft: 0 8px 16px rgba(176, 144, 116, 0.08);
      --btn: linear-gradient(135deg, #FFD8A8, #FFC7B5);
      --btn-secondary: rgba(255, 246, 237, 0.96);
      --grid-line: rgba(201, 170, 133, 0.22);
      --board-1: #FFF8ED;
      --board-2: #FDF2DF;
      --board-border: #E8C9A4;
      --easy: #90EE90;
      --normal: #F6B26B;
      --hard: #E57373;
      --berry: #E85D75;
      --gold: #F5BF52;
      --leaf: #88C26E;
      --sparkle: #FFD978;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 26px 14px 38px;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.85), transparent 24%),
        radial-gradient(circle at 80% 16%, rgba(255, 244, 221, 0.9), transparent 26%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
    }

    .app {
      width: min(94vw, 620px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      flex-wrap: wrap;
    }

    .title-group h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 700;
      color: #7A5247;
    }

    .title-group p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .scores {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .score-card {
      min-width: 108px;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--card-strong);
      border: 1px solid rgba(230, 201, 168, 0.7);
      text-align: center;
      box-shadow: var(--shadow-soft);
    }

    .score-card span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .score-card strong {
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
      color: #7A5247;
    }

    .game-shell {
      position: relative;
      padding: 14px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 0 6px 10px;
      color: var(--muted);
      font-size: 14px;
      flex-wrap: wrap;
    }

    .difficulty-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 247, 237, 0.95);
      border: 1px solid rgba(230, 201, 168, 0.7);
      box-shadow: var(--shadow-soft);
      color: #8D6856;
    }

    .board-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 24px;
      border: 2px solid var(--board-border);
      background: linear-gradient(135deg, rgba(255, 249, 236, 0.95), rgba(252, 239, 219, 0.92));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
        linear-gradient(135deg, var(--board-1), var(--board-2));
      background-size: 5% 5%, 5% 5%, auto;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(255, 248, 240, 0.76);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.22s ease, visibility 0.22s ease;
      z-index: 2;
    }

    .overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .overlay-card {
      width: min(100%, 380px);
      padding: 24px 20px;
      border-radius: 26px;
      background: var(--card);
      border: 1px solid rgba(230, 201, 168, 0.82);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 30px;
      color: #7A5247;
    }

    .overlay-card p {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
    }

    .difficulty-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .difficulty-btn {
      border: 1px solid rgba(230, 201, 168, 0.9);
      background: rgba(255, 250, 243, 0.95);
      color: #8D6856;
      border-radius: 18px;
      padding: 14px 10px;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .difficulty-btn strong {
      display: block;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .difficulty-btn span {
      display: block;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .difficulty-btn.active {
      background: linear-gradient(135deg, #FFF6DF, #FFE6D7);
      border-color: #E0B685;
      transform: translateY(-2px);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 15px;
      font-weight: 600;
      color: #7A5247;
      background: var(--btn);
      box-shadow: var(--shadow-soft);
      transition: transform 0.12s ease, filter 0.12s ease, background 0.12s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .secondary-btn {
      background: var(--btn-secondary);
      border: 1px solid rgba(230, 201, 168, 0.82);
    }

    .controls {
      padding: 16px;
    }

    .controls-title {
      margin: 0 0 14px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .dpad {
      width: min(100%, 290px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      user-select: none;
    }

    .dpad .spacer {
      visibility: hidden;
    }

    .dir-btn {
      min-height: 58px;
      border-radius: 20px;
      padding: 0;
      background: rgba(255, 250, 244, 0.95);
      border: 1px solid rgba(230, 201, 168, 0.82);
      color: #9A6D5F;
      font-size: 25px;
      font-weight: 700;
    }

    .dir-btn.active,
    .dir-btn:active {
      background: #FFE9D6;
    }

    .footer-tip {
      padding-bottom: 4px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .music-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 56px;
      height: 56px;
      padding: 0;
      border-radius: 50%;
      background: rgba(255, 250, 244, 0.96);
      border: 1px solid rgba(230, 201, 168, 0.9);
      box-shadow: 0 10px 22px rgba(176, 144, 116, 0.16);
      font-size: 24px;
      z-index: 4;
    }

    @media (max-width: 620px) {
      body {
        padding: 14px 10px 86px;
        align-items: flex-start;
      }

      .app {
        width: 100%;
      }

      .topbar {
        padding: 14px;
      }

      .title-group h1 {
        font-size: 24px;
      }

      .score-card {
        flex: 1 1 0;
        min-width: 0;
      }

      .difficulty-grid {
        grid-template-columns: 1fr;
      }

      .overlay-card {
        padding: 22px 16px;
      }

      .dir-btn {
        min-height: 54px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel topbar">
      <div class="title-group">
        <h1>午后茶会贪吃蛇</h1>
        <p>方向键或 WASD 控制，空格暂停，暖暖地来一局</p>
      </div>
      <div class="scores">
        <div class="score-card">
          <span>当前分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-card">
          <span>最高分</span>
          <strong id="highScore">0</strong>
        </div>
      </div>
    </section>

    <section class="panel game-shell">
      <div class="status-bar">
        <span id="statusText">选择难度后开始</span>
        <span class="difficulty-badge" id="difficultyBadge">难度：普通</span>
      </div>
      <div class="board-wrap">
        <canvas id="gameCanvas" width="600" height="600" aria-label="贪吃蛇游戏画布"></canvas>

        <div class="overlay show" id="menuOverlay">
          <div class="overlay-card">
            <h2>下午茶时间</h2>
            <p>先选一个难度，再按任意方向键开始。<br />手机也可以点击下方方向按钮开局。</p>
            <div class="difficulty-grid" id="difficultyGrid">
              <button class="difficulty-btn" data-level="easy" type="button">
                <strong>简单</strong>
                <span>速度慢，食物更多，抹茶绿色小蛇</span>
              </button>
              <button class="difficulty-btn active" data-level="normal" type="button">
                <strong>普通</strong>
                <span>标准节奏，暖橙色小蛇</span>
              </button>
              <button class="difficulty-btn" data-level="hard" type="button">
                <strong>困难</strong>
                <span>速度快，偶尔有障碍物，莓果红小蛇</span>
              </button>
            </div>
          </div>
        </div>

        <div class="overlay" id="pauseOverlay">
          <div class="overlay-card">
            <h2>已暂停</h2>
            <p>按空格键继续，或者点方向按钮重新进入节奏。</p>
          </div>
        </div>

        <div class="overlay" id="gameOverOverlay">
          <div class="overlay-card">
            <h2>游戏结束</h2>
            <p id="finalScoreText">最终分数：0</p>
            <div class="actions">
              <button id="restartBtn" type="button">再来一局</button>
              <button id="backMenuBtn" type="button" class="secondary-btn">返回菜单</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel controls">
      <p class="controls-title">手机方向按钮</p>
      <div class="dpad">
        <div class="spacer"></div>
        <button class="dir-btn" data-direction="up" aria-label="向上">↑</button>
        <div class="spacer"></div>
        <button class="dir-btn" data-direction="left" aria-label="向左">←</button>
        <button class="dir-btn" data-direction="down" aria-label="向下">↓</button>
        <button class="dir-btn" data-direction="right" aria-label="向右">→</button>
      </div>
    </section>

    <div class="footer-tip">吃到水果会长大并加分。困难模式会出现障碍物，撞墙、撞自己或撞到障碍物都会结束。</div>
  </main>

  <button id="musicToggle" class="music-toggle" type="button" aria-label="背景音乐开关">🔇</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const statusTextEl = document.getElementById('statusText');
    const difficultyBadgeEl = document.getElementById('difficultyBadge');
    const menuOverlay = document.getElementById('menuOverlay');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScoreText = document.getElementById('finalScoreText');
    const restartBtn = document.getElementById('restartBtn');
    const backMenuBtn = document.getElementById('backMenuBtn');
    const difficultyButtons = [...document.querySelectorAll('.difficulty-btn')];
    const dirButtons = [...document.querySelectorAll('.dir-btn')];
    const musicToggle = document.getElementById('musicToggle');

    const gridCount = 20;
    const cellSize = canvas.width / gridCount;
    const storageKey = 'classic-snake-best-score';
    const directionMap = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };
    const oppositeDirection = {
      up: 'down',
      down: 'up',
      left: 'right',
      right: 'left'
    };
    const difficulties = {
      easy: {
        label: '简单',
        speed: 170,
        foodCount: 2,
        snakeColor: '#90EE90',
        snakeHead: '#79DB79',
        obstacleCount: 0
      },
      normal: {
        label: '普通',
        speed: 128,
        foodCount: 1,
        snakeColor: '#F6B26B',
        snakeHead: '#EF9A43',
        obstacleCount: 0
      },
      hard: {
        label: '困难',
        speed: 95,
        foodCount: 1,
        snakeColor: '#E57373',
        snakeHead: '#D85959',
        obstacleCount: 2
      }
    };

    let snake = [];
    let foods = [];
    let obstacles = [];
    let particles = [];
    let direction = 'right';
    let pendingDirection = 'right';
    let score = 0;
    let highScore = Number(localStorage.getItem(storageKey) || 0);
    let started = false;
    let paused = false;
    let gameOver = false;
    let selectedDifficulty = 'normal';
    let lastMoveTime = 0;
    let lastFrameTime = 0;
    let audioContext = null;
    let musicEnabled = false;
    let musicTimer = null;

    highScoreEl.textContent = highScore;

    function toggleOverlay(element, show) {
      element.classList.toggle('show', show);
    }

    function updateDifficultyUI() {
      const label = difficulties[selectedDifficulty].label;
      difficultyBadgeEl.textContent = `难度：${label}`;
      difficultyButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.level === selectedDifficulty);
      });
    }

    function pickFreeCell() {
      let candidate;
      do {
        candidate = {
          x: Math.floor(Math.random() * gridCount),
          y: Math.floor(Math.random() * gridCount)
        };
      } while (
        snake.some((segment) => segment.x === candidate.x && segment.y === candidate.y) ||
        foods.some((food) => food.x === candidate.x && food.y === candidate.y) ||
        obstacles.some((obstacle) => obstacle.x === candidate.x && obstacle.y === candidate.y)
      );
      return candidate;
    }

    function createFruit(type) {
      const point = pickFreeCell();
      return {
        ...point,
        type,
        pulse: Math.random() * Math.PI * 2
      };
    }

    function syncFoods() {
      const config = difficulties[selectedDifficulty];
      while (foods.length < config.foodCount) {
        foods.push(createFruit(foods.length % 2 === 0 ? 'berry' : 'gold'));
      }
      while (foods.length > config.foodCount) {
        foods.pop();
      }
    }

    function setupObstacles() {
      obstacles = [];
      const config = difficulties[selectedDifficulty];
      if (config.obstacleCount <= 0) return;
      for (let i = 0; i < config.obstacleCount; i++) {
        obstacles.push(pickFreeCell());
      }
    }

    function maybeAddHardObstacle() {
      if (selectedDifficulty !== 'hard') return;
      const targetCount = 2 + Math.floor(score / 4);
      while (obstacles.length < Math.min(targetCount, 6)) {
        obstacles.push(pickFreeCell());
      }
    }

    function updateScore() {
      scoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem(storageKey, String(highScore));
        highScoreEl.textContent = highScore;
      }
    }

    function setDifficulty(level) {
      selectedDifficulty = level;
      updateDifficultyUI();
      if (!started && !gameOver) {
        resetGame(false);
      }
    }

    function resetGame(showMenu = true) {
      snake = [
        { x: 6, y: 10 },
        { x: 5, y: 10 },
        { x: 4, y: 10 }
      ];
      foods = [];
      obstacles = [];
      particles = [];
      direction = 'right';
      pendingDirection = 'right';
      score = 0;
      started = false;
      paused = false;
      gameOver = false;
      lastMoveTime = 0;
      scoreEl.textContent = '0';
      finalScoreText.textContent = '最终分数：0';
      setupObstacles();
      syncFoods();
      updateDifficultyUI();
      statusTextEl.textContent = showMenu ? '选择难度后开始' : '按任意方向键开始';
      toggleOverlay(menuOverlay, showMenu);
      toggleOverlay(pauseOverlay, false);
      toggleOverlay(gameOverOverlay, false);
      draw(16);
    }

    function returnToMenu() {
      resetGame(true);
    }

    function tryStart() {
      if (!started && !gameOver) {
        started = true;
        paused = false;
        statusTextEl.textContent = '进行中';
        toggleOverlay(menuOverlay, false);
        toggleOverlay(pauseOverlay, false);
        ensureAudioContext();
        if (musicEnabled) {
          startMusicLoop();
        }
      }
    }

    function setDirection(nextDirection) {
      if (gameOver) return;
      if (!directionMap[nextDirection]) return;
      const baseDirection = started ? pendingDirection : direction;
      if (oppositeDirection[baseDirection] === nextDirection) return;
      pendingDirection = nextDirection;
      tryStart();
    }

    function togglePause() {
      if (!started || gameOver) return;
      paused = !paused;
      toggleOverlay(pauseOverlay, paused);
      statusTextEl.textContent = paused ? '已暂停' : '进行中';
      if (paused) {
        stopMusicLoop();
      } else {
        lastMoveTime = performance.now();
        if (musicEnabled) startMusicLoop();
      }
    }

    function endGame() {
      gameOver = true;
      started = false;
      paused = false;
      finalScoreText.textContent = `最终分数：${score}`;
      statusTextEl.textContent = '游戏结束';
      toggleOverlay(pauseOverlay, false);
      toggleOverlay(gameOverOverlay, true);
      playGameOverSound();
      stopMusicLoop();
    }

    function createStars(x, y) {
      for (let i = 0; i < 7; i++) {
        const angle = (Math.PI * 2 * i) / 7 + Math.random() * 0.35;
        particles.push({
          x: x * cellSize + cellSize / 2,
          y: y * cellSize + cellSize / 2,
          vx: Math.cos(angle) * (1.1 + Math.random() * 1.4),
          vy: Math.sin(angle) * (1.1 + Math.random() * 1.4),
          life: 1,
          size: 4 + Math.random() * 2
        });
      }
    }

    function updateParticles(delta) {
      const factor = delta / 16;
      particles = particles
        .map((particle) => ({
          ...particle,
          x: particle.x + particle.vx * factor,
          y: particle.y + particle.vy * factor - 0.2 * factor,
          life: particle.life - 0.03 * factor
        }))
        .filter((particle) => particle.life > 0);
    }

    function step() {
      direction = pendingDirection;
      const head = snake[0];
      const move = directionMap[direction];
      const nextHead = { x: head.x + move.x, y: head.y + move.y };
      const hitWall =
        nextHead.x < 0 ||
        nextHead.y < 0 ||
        nextHead.x >= gridCount ||
        nextHead.y >= gridCount;

      const hitSelf = snake.some((segment) => segment.x === nextHead.x && segment.y === nextHead.y);
      const hitObstacle = obstacles.some((obstacle) => obstacle.x === nextHead.x && obstacle.y === nextHead.y);

      if (hitWall || hitSelf || hitObstacle) {
        endGame();
        return;
      }

      snake.unshift(nextHead);

      const foodIndex = foods.findIndex((food) => food.x === nextHead.x && food.y === nextHead.y);
      if (foodIndex >= 0) {
        const eaten = foods[foodIndex];
        foods.splice(foodIndex, 1);
        score += 1;
        updateScore();
        createStars(eaten.x, eaten.y);
        playEatSound();
        syncFoods();
        maybeAddHardObstacle();
      } else {
        snake.pop();
      }
    }

    function drawRoundedCell(x, y, size, radius, fillStyle, strokeStyle) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + size, y, x + size, y + size, radius);
      ctx.arcTo(x + size, y + size, x, y + size, radius);
      ctx.arcTo(x, y + size, x, y, radius);
      ctx.arcTo(x, y, x + size, y, radius);
      ctx.closePath();
      ctx.fillStyle = fillStyle;
      ctx.fill();
      if (strokeStyle) {
        ctx.strokeStyle = strokeStyle;
        ctx.stroke();
      }
    }

    function drawBoardBackground() {
      const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, '#FFF9EC');
      bg.addColorStop(1, '#FCECD7');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = 'rgba(201, 170, 133, 0.22)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= gridCount; i++) {
        const pos = i * cellSize + 0.5;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawSnake() {
      const config = difficulties[selectedDifficulty];
      snake.forEach((segment, index) => {
        const padding = index === 0 ? 3.5 : 4.3;
        const size = cellSize - padding * 2;
        const x = segment.x * cellSize + padding;
        const y = segment.y * cellSize + padding;
        const baseColor = index === 0 ? config.snakeHead : config.snakeColor;
        drawRoundedCell(x, y, size, 10, baseColor, 'rgba(122, 82, 71, 0.08)');

        if (index === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.beginPath();
          ctx.arc(x + size * 0.35, y + size * 0.35, size * 0.09, 0, Math.PI * 2);
          ctx.arc(x + size * 0.65, y + size * 0.35, size * 0.09, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function drawFruit(food, delta) {
      food.pulse += delta * 0.006;
      const scale = 1 + Math.sin(food.pulse) * 0.06;
      const cx = food.x * cellSize + cellSize / 2;
      const cy = food.y * cellSize + cellSize / 2;
      const r = cellSize * 0.22 * scale;

      ctx.save();
      if (food.type === 'berry') {
        ctx.fillStyle = 'rgba(232, 93, 117, 0.16)';
        ctx.beginPath();
        ctx.arc(cx, cy + 2, r * 1.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#E85D75';
        ctx.beginPath();
        ctx.arc(cx, cy + 1, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#88C26E';
        ctx.beginPath();
        ctx.ellipse(cx - r * 0.35, cy - r * 1.05, r * 0.45, r * 0.22, -0.5, 0, Math.PI * 2);
        ctx.ellipse(cx + r * 0.35, cy - r * 1.05, r * 0.45, r * 0.22, 0.5, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = 'rgba(245, 191, 82, 0.18)';
        ctx.beginPath();
        ctx.arc(cx, cy + 2, r * 1.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#F5BF52';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#88C26E';
        ctx.beginPath();
        ctx.ellipse(cx + r * 0.15, cy - r * 1.05, r * 0.5, r * 0.24, 0.35, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawObstacles() {
      obstacles.forEach((obstacle) => {
        const pad = 7;
        const x = obstacle.x * cellSize + pad;
        const y = obstacle.y * cellSize + pad;
        const size = cellSize - pad * 2;
        drawRoundedCell(x, y, size, 8, '#DDBA9A', 'rgba(141, 104, 86, 0.18)');
        ctx.fillStyle = 'rgba(255,255,255,0.32)';
        ctx.beginPath();
        ctx.arc(x + size * 0.35, y + size * 0.35, size * 0.12, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawParticles() {
      particles.forEach((particle) => {
        ctx.save();
        ctx.globalAlpha = particle.life;
        ctx.translate(particle.x, particle.y);
        ctx.fillStyle = '#FFD978';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const outer = particle.size;
          const inner = particle.size * 0.45;
          const outerAngle = -Math.PI / 2 + (i * Math.PI * 2) / 5;
          const innerAngle = outerAngle + Math.PI / 5;
          if (i === 0) {
            ctx.moveTo(Math.cos(outerAngle) * outer, Math.sin(outerAngle) * outer);
          } else {
            ctx.lineTo(Math.cos(outerAngle) * outer, Math.sin(outerAngle) * outer);
          }
          ctx.lineTo(Math.cos(innerAngle) * inner, Math.sin(innerAngle) * inner);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });
    }

    function draw(delta) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBoardBackground();
      drawGrid();
      drawObstacles();
      foods.forEach((food) => drawFruit(food, delta));
      drawSnake();
      updateParticles(delta);
      drawParticles();
    }

    function loop(timestamp) {
      const delta = timestamp - lastFrameTime || 16;
      lastFrameTime = timestamp;
      const speed = difficulties[selectedDifficulty].speed;

      if (started && !paused && !gameOver) {
        if (!lastMoveTime) lastMoveTime = timestamp;
        if (timestamp - lastMoveTime >= speed) {
          lastMoveTime = timestamp;
          step();
        }
      }

      draw(Math.max(delta, 16));
      requestAnimationFrame(loop);
    }

    function keyToDirection(key) {
      const map = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
        w: 'up',
        W: 'up',
        s: 'down',
        S: 'down',
        a: 'left',
        A: 'left',
        d: 'right',
        D: 'right'
      };
      return map[key];
    }

    function pressDirectionButton(directionName, target) {
      setDirection(directionName);
      if (!target) return;
      target.classList.add('active');
      setTimeout(() => target.classList.remove('active'), 120);
    }

    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }

    function playTone({ frequency, duration, type = 'sine', volume = 0.05, when = 0 }) {
      if (!audioContext) return;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      const startAt = audioContext.currentTime + when;
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startAt);
      gainNode.gain.setValueAtTime(0.0001, startAt);
      gainNode.gain.exponentialRampToValueAtTime(volume, startAt + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start(startAt);
      oscillator.stop(startAt + duration + 0.02);
    }

    function playEatSound() {
      ensureAudioContext();
      playTone({ frequency: 880, duration: 0.12, type: 'triangle', volume: 0.04, when: 0 });
      playTone({ frequency: 1318, duration: 0.13, type: 'sine', volume: 0.028, when: 0.06 });
    }

    function playGameOverSound() {
      ensureAudioContext();
      playTone({ frequency: 392, duration: 0.22, type: 'sine', volume: 0.03, when: 0 });
      playTone({ frequency: 329, duration: 0.26, type: 'sine', volume: 0.026, when: 0.14 });
      playTone({ frequency: 261.6, duration: 0.34, type: 'triangle', volume: 0.024, when: 0.28 });
    }

    function scheduleMusicBar() {
      if (!musicEnabled || !audioContext || paused || gameOver || !started) return;
      const melody = [523.25, 659.25, 587.33, 698.46, 659.25, 587.33];
      melody.forEach((note, index) => {
        playTone({
          frequency: note,
          duration: 0.34,
          type: 'triangle',
          volume: 0.012,
          when: index * 0.34
        });
      });
      [261.63, 329.63, 392].forEach((note, index) => {
        playTone({
          frequency: note,
          duration: 0.72,
          type: 'sine',
          volume: 0.008,
          when: index * 0.68
        });
      });
    }

    function startMusicLoop() {
      if (!musicEnabled || !audioContext || musicTimer) return;
      scheduleMusicBar();
      musicTimer = setInterval(scheduleMusicBar, 2000);
    }

    function stopMusicLoop() {
      if (musicTimer) {
        clearInterval(musicTimer);
        musicTimer = null;
      }
    }

    function toggleMusic() {
      ensureAudioContext();
      musicEnabled = !musicEnabled;
      musicToggle.textContent = musicEnabled ? '🔊' : '🔇';
      if (musicEnabled && started && !paused && !gameOver) {
        startMusicLoop();
      } else {
        stopMusicLoop();
      }
    }

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        togglePause();
        return;
      }
      const nextDirection = keyToDirection(event.key);
      if (nextDirection) {
        event.preventDefault();
        setDirection(nextDirection);
      }
    });

    difficultyButtons.forEach((button) => {
      button.addEventListener('click', () => {
        setDifficulty(button.dataset.level);
      });
    });

    dirButtons.forEach((button) => {
      const directionName = button.dataset.direction;
      const handlePress = (event) => {
        event.preventDefault();
        pressDirectionButton(directionName, button);
      };
      button.addEventListener('click', handlePress);
      button.addEventListener('touchstart', handlePress, { passive: false });
    });

    restartBtn.addEventListener('click', () => {
      resetGame(false);
    });

    backMenuBtn.addEventListener('click', returnToMenu);
    musicToggle.addEventListener('click', toggleMusic);

    updateDifficultyUI();
    resetGame(true);
    requestAnimationFrame((timestamp) => {
      lastFrameTime = timestamp;
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
